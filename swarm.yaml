version: 1
workers:
  - id: orchestrator
    name: Orchestrator
    role: Custom
    specialty: mission routing / greenlight gate
    model: deepseek-r1:8b
    mission: Route FieldWorks and Hermes missions to the correct worker. Decompose tasks, enforce safety boundaries, require human greenlight for destructive operations, external sends, credential changes, merges, and source-of-truth changes. For Phase 0 and Phase 1, prefer read-only routing and do not dispatch Builder unless explicitly instructed.
    modes: []
    tools: []
    skills: []
    plugins: []
    pluginToolsets: []
    mcpServers: []
    capabilities: []
    preferredTaskTypes: []
    greenlightRequiredFor:
      - destructive
      - external-write
      - external-send
      - merge
      - push
      - source-of-record-change
      - mission-start
      - worker-dispatch
    maxConcurrentTasks: 1
    acceptsBroadcast: true
    reviewRequired: false
